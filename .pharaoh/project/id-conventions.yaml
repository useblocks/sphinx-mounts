# id-conventions.yaml — declared prefixes and the canonical ID regex.
#
# Validates against schemas/id-conventions.schema.json.
#
# `prefixes` mirrors [[needs.types]] in docs/ubproject.toml. `id_regex`
# matches the same shape declared there ([needs] id_regex): one of the three
# type prefixes, a SCREAMING_SNAKE domain token, and a 3-digit ordinal —
# e.g. FEAT_DIRMOUNT_001, CREQ_TOMLCONF_001, ERR_COLLISION_001.

prefixes:
  feat: FEAT_
  comp_req: CREQ_
  err: ERR_
  impl: IMPL_
  test: TEST_

id_regex: "^(FEAT|CREQ|ERR|IMPL|TEST)_[A-Z0-9_]*[0-9]{3}$"
separator: "_"
