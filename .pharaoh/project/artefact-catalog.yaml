# artefact-catalog.yaml — per-type contract for every declared need type.
#
# Validates against schemas/artefact-catalog.schema.json.
#
# Five types:
#   feat      capability
#   comp_req  testable obligation, :satisfies: a feat
#   err       failure condition, handled in a feat
#   impl      code marker, :links: a feat
#   test      :verifies: a comp_req and/or :detects: an err
# impl and test are authored in code as sphinx-codelinks one-line needs (see
# the [codelinks] tables in docs/ubproject.toml), not via RST.
#
# Forward traceability is enforced via `required_metadata_fields: source_doc`
# on the RST types (need -> code). Reverse traceability (code -> feat /
# comp_req) is carried by the impl/test one-line needs' outgoing links; the
# *incoming* rule ("every feat has an impl", "every comp_req has a test") is
# NOT representable here — see https://github.com/useblocks/sphinx-needs/issues/1590.
#
# OR-rules are left to checklists, not encoded as required_links (AND semantics):
#  - err:  at least one of tested_in / checked_in / mitigated_in.
#  - test: at least one of verifies / detects.

feat:
  required_fields: [id, status, title, source_doc]
  optional_fields: [issue]
  lifecycle: [open, in_progress, implemented]
  required_links: []
  optional_links: []
  required_metadata_fields: [status, source_doc]
  required_roles: []

comp_req:
  required_fields: [id, status, title, satisfies, source_doc]
  optional_fields: [issue]
  lifecycle: [open, in_progress, implemented]
  required_links: [satisfies]
  optional_links: []
  required_metadata_fields: [status, source_doc]
  required_roles: []

err:
  required_fields: [id, status, title, source_doc]
  optional_fields: [issue, severity]
  lifecycle: [open, in_progress, implemented]
  required_links: []
  optional_links: [tested_in, checked_in, mitigated_in]
  required_metadata_fields: [status, source_doc, severity]
  required_roles: []

# impl needs are authored in src/ as sphinx-codelinks one-line needs. Every
# impl carries a non-empty built-in `links` to the feat it implements —
# guaranteed by the mandatory one-line `links` field and checked by the
# "impl -> feat" chain in pharaoh.toml (kept out of required_links here, which
# lists named extra-link relations).
impl:
  required_fields: [id, status, title]
  optional_fields: []
  lifecycle: [open, in_progress, implemented]
  required_links: []
  optional_links: []
  required_metadata_fields: [status]
  required_roles: []

# test needs are authored in tests/ as one-line needs (second [codelinks]
# project). verifies (-> comp_req) and detects (-> err) are optional_links; the
# "at least one of verifies/detects" rule is a checklist item, not a
# required_link (which would force both).
test:
  required_fields: [id, status, title]
  optional_fields: []
  lifecycle: [open, in_progress, implemented]
  required_links: []
  optional_links: [verifies, detects]
  required_metadata_fields: [status]
  required_roles: []
