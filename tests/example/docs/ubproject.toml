# Single declarative source of truth for the example project. Both
# Sphinx (via ``sphinx-mounts``) and the ubCode language server read
# this file. After ``bazel build //:all_bundles`` runs once, the
# referenced paths exist and ubCode can resolve cross-references
# against them with no further build step.
"$schema" = "https://ubcode.useblocks.com/ubproject.schema.json"

[server]
index_on_save = true

# Bazel-generated RST bundle. Source is resolved relative to *this*
# file's directory (docs/), so ``../bazel-bin/bundles/api-foo`` lands
# at ``tests/example/bazel-bin/bundles/api-foo`` regardless of which
# OS or working directory the build is invoked from.
[[mounts]]
dir = "../bazel-bin/bundles/api-foo"
mount_at = "_generated/api-foo"
attach_to = "index"
entry_doc = "index"

# Bazel-generated Markdown bundle. No ``attach_to`` / ``entry_doc`` here —
# the host project references this bundle's entry doc by hand from
# ``index.rst``. This shows the two supported wiring styles side-by-side:
# auto-attach (api-foo) and manual reference (api-bar).
# ``myst-parser`` (loaded in conf.py) makes ``.md`` part of ``source_suffix``,
# so the entry doc is ``index.md``.
[[mounts]]
dir = "../bazel-bin/bundles/api-bar"
mount_at = "_generated/api-bar"

# ---------------------------------------------------------------------------
# Checked-in "directive showcase" bundles — NOT Bazel-generated. Each folder
# under ``../showcase/`` is a self-contained bundle demonstrating one
# file-referencing directive whose path stays inside the bundle root. They
# are plain files on disk (open the folder to see the directive next to the
# file it references), mounted in place just like the Bazel bundles above.
# Because every reference is bundle-relative, each survives ``path_check``
# (default ``"error"``) after mounting. Each entry doc is wired into the
# host ``index`` toctree via ``attach_to``.
[[mounts]]
dir = "../showcase/literalinclude"
mount_at = "_generated/showcase/literalinclude"
attach_to = "index"

[[mounts]]
dir = "../showcase/include"
mount_at = "_generated/showcase/include"
attach_to = "index"

[[mounts]]
dir = "../showcase/csv-table"
mount_at = "_generated/showcase/csv-table"
attach_to = "index"

[[mounts]]
dir = "../showcase/raw"
mount_at = "_generated/showcase/raw"
attach_to = "index"

[[mounts]]
dir = "../showcase/image"
mount_at = "_generated/showcase/image"
attach_to = "index"

[[mounts]]
dir = "../showcase/figure"
mount_at = "_generated/showcase/figure"
attach_to = "index"

[[mounts]]
dir = "../showcase/graphviz"
mount_at = "_generated/showcase/graphviz"
attach_to = "index"

[[mounts]]
dir = "../showcase/uml"
mount_at = "_generated/showcase/uml"
attach_to = "index"

[[mounts]]
dir = "../showcase/mermaid"
mount_at = "_generated/showcase/mermaid"
attach_to = "index"
