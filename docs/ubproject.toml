# Project-level configuration consumed by useblocks tooling — most
# importantly the ubCode language server (https://ubcode.useblocks.com/),
# but also any other static reader (IDE plugins, indexers, CI gates)
# that wants to understand this project's documentation setup without
# evaluating ``conf.py``. The TOML form also drives sphinx-needs itself
# via ``needs_from_toml = "ubproject.toml"`` set in ``conf.py``.
"$schema" = "https://ubcode.useblocks.com/ubproject.schema.json"

# Make the language server reindex the project automatically whenever a
# source document is saved, so cross-references and diagnostics reflect
# the latest edits without having to trigger a manual rebuild.
[server]
index_on_save = true

# ---------------------------------------------------------------------------
# Sphinx-Needs configuration — lightweight, agile traceability.
#
# The model deliberately mirrors the agile chain used by useblocks/ubconnect
# (feature -> component requirement) rather than a heavyweight V-model, plus
# an ``err`` type for failure conditions and an ``impl`` type that ties the
# source code to the features it implements:
#
#   feat      — a user-observable capability the extension provides.
#   comp_req  — a testable component requirement; ``:satisfies:`` a feat.
#   err       — an error: a failure condition tied to one or more feats.
#               (The directive is ``err`` rather than ``error`` to avoid
#               shadowing the built-in docutils ``.. error::`` admonition.)
#               Each error declares how it is addressed via one (or more)
#               of three link relations:
#                 :tested_in:    guarded by a test in the feature's suite
#                 :checked_in:   guarded by a runtime check in the feature
#                 :mitigated_in: tolerated by design (e.g. a warning + skip)
#   impl      — an implementation marker authored as a sphinx-codelinks
#               one-line need INSIDE the source (``@ title, IMPL_id,
#               [FEAT_id]``); created at build time from the [codelinks]
#               config below and ``:links:`` the feature it implements.
#               Not hand-written in RST.
#   test      — a test, authored the same way INSIDE the test suite
#               (``@ title, TEST_id, [comp_req], [err]``); ``:verifies:`` the
#               component requirement(s) it covers and/or ``:detects:`` the
#               error(s) it checks for (ISO 26262-8 fault detection).
#
# Lifecycle is ``open -> in_progress -> implemented`` (see
# ``.pharaoh/project/workflows.yaml``). There is no terminal "closed": an
# implemented need is done, and a need that no longer applies is deleted
# from the repository rather than retired in place.
#
# Traceability is a loop of *outgoing* links (all schema-validatable):
# test -> comp_req (:verifies:) and test -> err (:detects:); comp_req -> feat
# (:satisfies:); impl -> feat (:links:); err -> feat (handling). What is NOT
# yet expressible is the *incoming* rule "every feat must have at least one
# impl linking to it" — sphinx-needs schema validation cannot constrain
# incoming links / backlinks yet
# (https://github.com/useblocks/sphinx-needs/issues/1590). The ``source_doc``
# field additionally records need -> code paths. See
# docs/source/specs/traceability.rst.
# ---------------------------------------------------------------------------
[needs]
build_json = true

# Force the author to set an ID by hand. A title-derived auto-ID would
# break every inbound link the moment someone reworded the title.
id_required = true

# Allowed ID shape: one of the declared type prefixes, a SCREAMING_SNAKE
# domain token, and a 3-digit ordinal — e.g. ``FEAT_DIRMOUNT_001``,
# ``ERR_COLLISION_001``, ``TEST_TOCIDX_001``. Kept in sync with
# ``.pharaoh/project/id-conventions.yaml``.
id_regex = "(FEAT|CREQ|ERR|IMPL|TEST)_[A-Z0-9_]*[0-9]{3}"

# Allowed lifecycle states, enforced via the built-in ``status`` field's
# schema enum. (The older ``[[needs.statuses]]`` table is deprecated in
# sphinx-needs 8.x.) A ``:status:`` outside this set becomes a
# schema-validation finding — and an error under ``sphinx-build -W``.
[needs.fields.status]
description = "Lifecycle state: open -> in_progress -> implemented."
schema = { type = "string", enum = ["open", "in_progress", "implemented"] }

# --- Custom fields (sphinx-needs 8.x [needs.fields.<name>] shape) ---------
[needs.fields.source_doc]
description = "Path(s) under the repo root of the source file(s) that realise this need (comma-separated). Forward need -> code trace."
schema = { type = "string" }
nullable = true
default = ""

[needs.fields.issue]
description = "GitHub issue number tracking the underlying work, if any."
schema = { type = "string" }
nullable = true
default = ""

[needs.fields.severity]
description = "For errors: impact if the condition is hit unguarded — one of low / medium / high."
schema = { type = "string" }
nullable = true
default = ""

# --- Link types (sphinx-needs 8.x [needs.links.<name>] shape) -------------
[needs.links.satisfies]
description = "comp_req -> feat: the requirement satisfies (decomposes) the feature."
incoming = "is satisfied by"
outgoing = "satisfies"

[needs.links.tested_in]
description = "error -> feat: the error is guarded by a test in the feature's test suite."
incoming = "tested errors"
outgoing = "tested in"

[needs.links.checked_in]
description = "error -> feat: the error is guarded by a runtime check inside the feature."
incoming = "runtime-checked errors"
outgoing = "checked in"

[needs.links.mitigated_in]
description = "error -> feat: the error is tolerated by design in the feature (graceful degradation)."
incoming = "mitigated errors"
outgoing = "mitigated in"

[needs.links.verifies]
description = "test -> comp_req: the test verifies (exercises) the requirement."
incoming = "verified by"
outgoing = "verifies"

[needs.links.detects]
description = "test -> err: the test checks for / detects the error condition (ISO 26262-8 fault detection)."
incoming = "detected by"
outgoing = "detects"

# --- Need types ------------------------------------------------------------
[[needs.types]]
directive = "feat"
title = "Feature"
prefix = "FEAT_"
color = "#BFD8D2"
style = "node"

[[needs.types]]
directive = "comp_req"
title = "Component Requirement"
prefix = "CREQ_"
color = "#FEDCD2"
style = "node"

[[needs.types]]
directive = "err"
title = "Error"
prefix = "ERR_"
color = "#F5B7B1"
style = "node"

# Authored in source code as sphinx-codelinks one-line needs (see [codelinks]
# below), not via an RST directive — but still a first-class need type.
[[needs.types]]
directive = "impl"
title = "Implementation"
prefix = "IMPL_"
color = "#DF744A"
style = "node"

# Authored in the test suite as sphinx-codelinks one-line needs (second
# [codelinks] project below), not via an RST directive.
[[needs.types]]
directive = "test"
title = "Test"
prefix = "TEST_"
color = "#DarkTurquoise"
style = "node"

# ---------------------------------------------------------------------------
# sphinx-codelinks configuration.
#
# Read by sphinx-codelinks AND ubCode because ``conf.py`` sets
# ``src_trace_config_from_toml = "ubproject.toml"``. ubCode currently supports
# the one-line-need form configured this way. Two projects are scanned:
#
#   sphinx_mounts        — src/, one-line ``impl`` needs:
#                            # @ <title>, <IMPL_id>, [<feat-id>, ...]
#                          each ``:links:`` the feature(s) it implements.
#   sphinx_mounts_tests  — tests/, one-line ``test`` needs:
#                            # @ <title>, <TEST_id>, [<comp_req>], [<err>]
#                          each ``:verifies:`` requirement(s) and/or
#                          ``:detects:`` error(s).
#
# In both, ``type`` and ``status`` come from field defaults, so they are never
# written in the comment — the author writes only the title, id, and links.
# ---------------------------------------------------------------------------
[codelinks]
# Copy each marked source file into the build and cross-link the marked line
# to the need it creates (and back), so the HTML carries source <-> need both
# ways.
set_local_url = true

[codelinks.projects.sphinx_mounts.source_discover]
src_dir = "../src/sphinx_mounts" # relative to confdir (the docs/ directory)
comment_type = "python"
gitignore = true

[codelinks.projects.sphinx_mounts.analyse]
get_oneline_needs = true
get_need_id_refs = false

# One-line field order. Parsing is POSITIONAL and defaults fill only TRAILING
# omitted fields, so the two defaulted fields (type, status) must come last —
# which lets authors write just ``@ title, IMPL_id, [feat-ids]``. The first
# three (title, id, links) have no default and are therefore mandatory.
[codelinks.projects.sphinx_mounts.analyse.oneline_comment_style]
needs_fields = [
  { name = "title" },
  { name = "id" },
  { name = "links", type = "list[str]" },
  { name = "type", default = "impl" },
  { name = "status", default = "implemented" },
]

# Second project: the test suite. Same one-line mechanism, different need type
# and link fields.
[codelinks.projects.sphinx_mounts_tests.source_discover]
src_dir = "../tests"    # relative to confdir (the docs/ directory)
comment_type = "python"
gitignore = true

[codelinks.projects.sphinx_mounts_tests.analyse]
get_oneline_needs = true
get_need_id_refs = false

# Two list fields: ``verifies`` (-> comp_req) is mandatory — write ``[]`` when
# a test only detects an error; ``detects`` (-> err) is optional. ``type`` and
# ``status`` trail with defaults so they are never written in the comment.
[codelinks.projects.sphinx_mounts_tests.analyse.oneline_comment_style]
needs_fields = [
  { name = "title" },
  { name = "id" },
  { name = "verifies", type = "list[str]" },
  { name = "detects", type = "list[str]", default = [
  ] },
  { name = "type", default = "test" },
  { name = "status", default = "implemented" },
]
