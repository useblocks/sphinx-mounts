name: ci

on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  pull_request:
    types: [closed, labeled, reopened, unlabeled, synchronize, opened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  id-token: write
  contents: read

jobs:
  prek:
    name: Prek
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run --frozen prek run --all-files --show-diff-on-failure
        env:
          PREK_COLOR: always

  ty:
    name: ty
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - run: python -m pip install tox tox-uv
      - run: tox -e ty

  pytest:
    name: "Pytest: ${{ matrix.tox-env }} (${{ matrix.os }})"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.12"
            tox-env: py312-sphinx7
          - os: ubuntu-latest
            python: "3.12"
            tox-env: py312-sphinx9
          - os: ubuntu-latest
            python: "3.13"
            tox-env: py313-sphinx9
          - os: ubuntu-latest
            python: "3.14"
            tox-env: py314-sphinx9
          - os: windows-latest
            python: "3.12"
            tox-env: py312-sphinx9
          - os: macos-latest
            python: "3.14"
            tox-env: py314-sphinx9

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.python }}"
          allow-prereleases: true
      - run: python -m pip install tox tox-uv
      - run: tox -e "${{ matrix.tox-env }}"

  bazel:
    name: Bazel integration test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
      - run: python -m pip install tox tox-uv
      - run: tox -e bazel

  docs:
    name: Documentation build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - run: python -m pip install tox tox-uv
      - run: tox -e docs-clean

  all_good:
    if: ${{ !cancelled() }}
    needs:
      - prek
      - ty
      - pytest
      - bazel
      - docs
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
